name: Recollida diària de temperatures

on:
  schedule:
    - cron: '33 13 * * *'
  workflow_dispatch:

jobs:
  save-temperature:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instal·lar dependències
      run: pip install requests

    - name: Executar script de temperatures
      run: python temperatures.py

    - name: Pujar el fitxer JSON al repositori
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add temp_*.json
        git commit -m "Afegir dades de temperatura del dia $(date +'%Y-%m-%d')" || echo "No hi ha canvis per cometre"
        git push
